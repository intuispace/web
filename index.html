<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IntuiSpace | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
font-family:'Inter',sans-serif;
background: radial-gradient(circle at top,#121224,#060608);
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.container{
max-width:700px;
padding:40px;
}

.logo{
font-family:'Space Grotesk',sans-serif;
font-size:48px;
letter-spacing:2px;
background:linear-gradient(90deg,#7C5CFF,#00E5FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
margin-top:10px;
font-size:18px;
opacity:.8;
}

.coming{
margin-top:30px;
font-size:26px;
font-weight:600;
}

.notify{
margin-top:40px;
display:flex;
justify-content:center;
}

input{
padding:14px;
width:260px;
border:none;
border-radius:6px 0 0 6px;
outline:none;
}

button{
padding:14px 22px;
border:none;
background:#7C5CFF;
color:white;
font-weight:600;
border-radius:0 6px 6px 0;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00E5FF;
}

.footer{
margin-top:40px;
opacity:.6;
font-size:14px;
}

/* floating glow */

.glow{
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,#7C5CFF55,transparent);
top:-100px;
left:-100px;
animation:move 8s infinite alternate;
}

@keyframes move{
to{
transform:translate(200px,200px);
}
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="logo">INTUISPACE</div>

<div class="tagline">
Revolutionizing intuitive spaces in technology
</div>

<div class="coming">
Launching Soon
</div>

<div class="notify">
<input placeholder="Enter your email">
<button>Notify Me</button>
</div>

<div class="footer">
© 2026 IntuiSpace
</div>

</div>

</body>
</html>
