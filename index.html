<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intuispace | Coming Soon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 300;
            margin-top: 10px;
            opacity: 0.8;
        }

        .coming-soon {
            margin-top: 40px;
            font-size: 1.5rem;
            font-weight: 600;
            animation: fadeIn 2s ease-in-out infinite alternate;
        }

        @keyframes fadeIn {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .dot {
            color: #00d4ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Intui<span class="dot">Space</span></h1>
        <div class="tagline">Space for Innovation</div>
        <div class="coming-soon">🚀 Launching Soon</div>
    </div>

    <div class="footer">
        © 2026 Intuispace. All rights reserved.
    </div>

</body>
</html>
